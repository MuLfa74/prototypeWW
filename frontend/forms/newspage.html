<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/fonts.css">
    <title>PrototypeWW | News</title>
</head>
<body>
    <script src="../js/config.js"></script>
    <div class="header">
        <label>PrototypeWW</label>
        <div class="inputtext">
            <img sizes="" src="../assets/search-svgrepo-com.svg" alt="Найти">
            <input type="text" id="search-input" placeholder="Поиск">
        </div>
        <div class="button"><a href="mappage.html">Карта</a></div>
    </div>
    <div class="main-content">
        <div class="side-bar">
            <label>Категории</label>
            <div class="card category-btn" data-category="Общество">Бытовые новости</div>
            <div class="card category-btn" data-category="ДТП">ДТП</div>
            <div class="card category-btn" data-category="Происшествия">Происшествия</div>
            <div class="card category-btn" data-category="Культура">Культура</div>
        </div>
        <div class="feed" id="feed">
            <script src="../js/render_news.js"></script>
            <script>
                if (document.getElementById('feed').querySelectorAll('.event').length === 0) {
                    document.getElementById('feed').innerHTML = '<center>Упс.. кажется новостей нет</center>';
                }
            </script>
        </div>
        <div class="side-bar">
            <label>Сводка дня</label>
            <!--Заглушки-->
            <div class="event">aaa</div>
            <div class="event">aaa</div>
        </div>
    </div>
</body>
</html>
