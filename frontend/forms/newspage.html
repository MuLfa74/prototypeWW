<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <title>PrototypeWW | News</title>
</head>
<body>
    <script src="/js/config.js"></script>
    <div class="header">
        <div style="display:flex; flex-direction:column;">
            <label>PrototypeWW</label>
            <div id="news-last-updated" style="font-size:12px; opacity:.75; margin-top:2px;">Последнее обновление: ...</div>
        </div>
        <div class="inputtext">
            <img sizes="" src="/assets/search-svgrepo-com.svg" alt="Найти">
            <input type="text" id="search-input" placeholder="Поиск">
        </div>
        <div class="button"><a href="/map">Карта</a></div>
    </div>
    <div class="main-content">
        <div class="side-bar">
            <label>Категории</label>
            <div class="card category-btn" data-category="Общество">Общество</div>
            <div class="card category-btn" data-category="ДТП">ДТП</div>
            <div class="card category-btn" data-category="Происшествия">Происшествия</div>
            <div class="card category-btn" data-category="Культура">Культура</div>
        </div>
        <div class="feed" id="feed"></div>
        <script src="/js/render_news.js"></script>
        <script src="/js/search.js"></script>
        <div class="side-bar">
            <label>Сводка дня</label>
            <div id="daily-summary"></div>
        </div>
    </div>
</body>
</html>
